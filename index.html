<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXORA | Protocol v.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <header class="blur-reveal">
            <div class="status-row">
                <span class="status-dot"></span>
                <span id="typewriter"></span>
            </div>
            <button id="musicToggle" class="music-btn">SOUND: OFF</button>
        </header>

        <main>
            <section class="hero-section blur-reveal">
                <div class="status-badge">STABLE RELEASE</div>
                <h2 class="main-title">NEXORA APK</h2>
                
                <div class="action-grid">
                    <div id="verify-box">
                        <p class="verify-label">> HUMAN_CHECK_REQUIRED</p>
                        <span id="math-question"></span>
                        <div class="verify-input-row">
                            <input type="number" id="math-answer" placeholder="...">
                            <button onclick="checkVerify()" class="btn-verify">VERIFY</button>
                        </div>
                    </div>

                    <button class="btn-main" id="btnDownload">
                        <span class="btn-text">INITIALIZE INSTALLATION</span>
                        <div class="btn-progress"></div>
                    </button>
                </div>
            </section>

            <section class="data-cards blur-reveal">
                <div class="card">
                    <span class="card-label">INSTALLS</span>
                    <span class="card-value" id="downloadCount">0</span>
                </div>
                <div class="card">
                    <span class="card-label">SIZE</span>
                    <span class="card-value">14.2 MB</span>
                </div>
                <div class="card">
                    <span class="card-label">STATUS</span>
                    <span class="card-value blink" style="color: #ffffff;">ONLINE</span>
                </div>
            </section>
        </main>

        <footer>
            <a href="tutorial.html" class="guide-link">VIEW INSTALLATION GUIDE</a>
            <p class="footer-copy">© 2026 NEXORA SYSTEM</p>
        </footer>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
