<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CERRO PREMIUM CHAT</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #212121;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%; max-width: 500px;
            height: 100vh; display: flex; flex-direction: column;
            background: #212121;
        }

        .chat-header {
            padding: 12px; text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .chat-header h2 {
            font-size: 0.85rem; letter-spacing: 2px; margin: 0;
            text-transform: uppercase; text-shadow: 0 0 10px #fff; font-weight: 900;
        }

        .chat-display {
            flex: 1; overflow-y: auto;
            padding: 15px; display: flex; flex-direction: column;
            gap: 12px; -webkit-overflow-scrolling: touch;
        }
        .chat-display::-webkit-scrollbar { display: none; }

        .message-item { display: flex; width: 100%; animation: fadeIn 0.3s ease; margin-bottom: 5px; }
        .message-item.left { justify-content: flex-start; }
        .message-item.right { justify-content: flex-end; }

        .message-bubble {
            padding: 10px 12px; max-width: 85%;
            min-width: 100px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        .message-item.left .message-bubble {
            background: #2a2a2a; border-left: 3px solid #ffffff;
            border-radius: 4px 15px 15px 15px;
        }

        .message-item.right .message-bubble {
            background: #444444; border-right: 3px solid #ffffff;
            border-radius: 15px 4px 15px 15px; text-align: left;
        }

        .message-bubble b { display: block; font-size: 0.6rem; color: #aaa; margin-bottom: 3px; text-transform: uppercase; }
        .message-bubble p { margin: 0; font-size: 0.85rem; line-height: 1.3; color: #eee; word-break: break-word; }
        
        /* Gambar & Tombol Download */
        .img-wrapper {
            position: relative;
            margin-top: 8px;
            width: 100%;
        }

        .chat-img { 
            width: 100%; 
            border-radius: 8px; 
            display: block; 
            cursor: pointer; 
        }

        .dl-mini-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            z-index: 5;
        }

        .dl-mini-btn:hover {
            background: #ffffff;
            color: #000;
            transform: scale(1.1);
        }

        .chat-time { display: block; font-size: 0.55rem; opacity: 0.4; margin-top: 5px; text-align: right; }

        .input-bar-container {
            padding: 10px; 
            background: #1a1a1a;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .input-bar {
            display: flex; align-items: center; 
            gap: 8px; width: 100%;
        }

        .input-bar input[type="text"] {
            flex: 1; min-width: 0; 
            background: #2a2a2a; border: 1px solid #333;
            color: #fff; padding: 10px 15px; border-radius: 20px;
            outline: none; font-size: 0.85rem;
        }

        .icon-btn {
            flex-shrink: 0; width: 35px; height: 35px;
            background: none; border: none; color: #666;
            font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .send-btn {
            flex-shrink: 0; width: 38px; height: 38px;
            background: #ffffff; color: #000; border: none;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header"><h2>Cerro Chat</h2></div>
        <div id="chat-box" class="chat-display"></div>

        <div class="input-bar-container">
            <div class="input-bar">
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewStatus()">
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-camera" id="camIcon"></i>
                </button>
                <input type="text" id="chatInput" placeholder="Pesan..." autocomplete="off">
                <button class="send-btn" id="btnAction" onclick="sendAction()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDVlj5YKtBQXdX_u40P5X_NtrvOV1-ANkM",
            authDomain: "panel-e85ed.firebaseapp.com",
            databaseURL: "https://panel-e85ed-default-rtdb.firebaseio.com",
            projectId: "panel-e85ed",
            storageBucket: "panel-e85ed.firebasestorage.app",
            messagingSenderId: "636109475101",
            appId: "1:636109475101:android:bf411e8b319ddb088165f4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref('users/');
        const chatBox = document.getElementById('chat-box');

        const getDeviceInfo = () => {
            const ua = navigator.userAgent;
            let model = "User";
            if (ua.includes("Android")) {
                const match = ua.match(/\(([^;]+);([^;]+);([^)]+)\)/);
                if (match) {
                    model = match[3].split("Build/")[0].trim();
                } else {
                    model = "Android Device";
                }
            }
            const uniqueId = Math.floor(1000 + Math.random() * 9000);
            return `${model}#${uniqueId}`;
        };

        const myDevice = getDeviceInfo();

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function previewStatus() {
            const file = document.getElementById('fileInput').files[0];
            if (file) document.getElementById('camIcon').style.color = "#fff";
        }

        chatRef.limitToLast(30).on('child_added', (snap) => {
            const data = snap.val();
            if(!data) return;

            let sender = "System", message = "", timeStamp = data.time || "--:--";
            
            if(data.Chat) {
                const parts = data.Chat.split(':');
                sender = parts[0].trim();
                message = parts.slice(1).join(':').split('|')[0].trim();
                if(data.Chat.includes('|')) timeStamp = data.Chat.split('|').pop().trim();
            }

            const isMe = (sender === myDevice);
            const item = document.createElement('div');
            item.className = `message-item ${isMe ? 'right' : 'left'}`;
            
            // Logika Gambar dengan Tombol Download Khusus Pesan Orang Lain
            let imgHtml = "";
            if (data.link && data.link.startsWith("data:image")) {
                imgHtml = `
                    <div class="img-wrapper">
                        <img src="${data.link}" class="chat-img" onclick="window.open('${data.link}')">
                        ${!isMe ? `
                            <a href="${data.link}" download="nexora_${Date.now()}.png" class="dl-mini-btn">
                                <i class="fas fa-download"></i>
                            </a>
                        ` : ""}
                    </div>`;
            }

            item.innerHTML = `
                <div class="message-bubble">
                    <b>${sender}</b>
                    ${message ? `<p>${message}</p>` : ""}
                    ${imgHtml}
                    <span class="chat-time">${timeStamp}</span>
                </div>
            `;
            chatBox.appendChild(item);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        async function sendAction() {
            const input = document.getElementById('chatInput');
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('btnAction');
            const val = input.value.trim();
            const file = fileInput.files[0];

            if (!val && !file) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                let imageData = file ? await toBase64(file) : "";
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                
                await chatRef.push().set({
                    "Chat": `${myDevice}: ${val} | ${timeStr}`,
                    "link": imageData,
                    "time": timeStr,
                    "timestamp": firebase.database.ServerValue.TIMESTAMP
                });

                input.value = "";
                fileInput.value = "";
                document.getElementById('camIcon').style.color = "#666";
            } catch (e) {
                alert("Gagal mengirim!");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendAction();
        });
    </script>
</body>
</html>
