<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXORA PREMIUM CHAT</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #212121;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%; max-width: 500px;
            height: 100vh; display: flex; flex-direction: column;
            background: #212121;
        }

        .chat-header {
            padding: 15px; text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-header h2 {
            font-size: 0.9rem; letter-spacing: 3px; margin: 0;
            text-transform: uppercase; text-shadow: 0 0 10px #fff; font-weight: 900;
        }

        /* AREA CHAT */
        .chat-display {
            flex: 1; overflow-y: auto;
            padding: 15px; display: flex; flex-direction: column;
            gap: 15px; -webkit-overflow-scrolling: touch;
        }
        .chat-display::-webkit-scrollbar { display: none; }

        /* LOGIKA BUBBLE */
        .message-item {
            display: flex; width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .message-item.left { justify-content: flex-start; }
        .message-item.left .message-bubble {
            background: #2a2a2a;
            border-left: 4px solid #ffffff;
            border-radius: 4px 18px 18px 18px;
        }

        .message-item.right { justify-content: flex-end; }
        .message-item.right .message-bubble {
            background: #444444;
            border-right: 4px solid #ffffff;
            border-left: none;
            border-radius: 18px 4px 18px 18px;
            text-align: right;
        }

        .message-bubble {
            padding: 12px; max-width: 80%;
            min-width: 120px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .message-bubble b {
            display: block; font-size: 0.65rem;
            color: #aaa; margin-bottom: 4px;
            text-transform: uppercase;
        }

        .message-bubble p {
            margin: 0; font-size: 0.85rem;
            line-height: 1.4; color: #eee;
            word-break: break-word;
        }

        .chat-img {
            width: 100%; border-radius: 10px;
            margin-top: 8px; border: 1px solid rgba(255,255,255,0.1);
            display: block;
        }

        /* STYLE WAKTU */
        .chat-time {
            display: block;
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 5px;
            text-align: right;
        }

        /* INPUT BAR */
        .input-bar-container {
            padding: 15px; background: #212121;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-bar {
            display: flex; align-items: center; gap: 10px;
            background: #1a1a1a; padding: 5px 15px;
            border-radius: 25px; border: 1px solid #333;
        }

        .input-bar input[type="text"] {
            flex: 1; background: transparent; border: none;
            color: #fff; padding: 10px 0; outline: none; font-size: 0.9rem;
        }

        .icon-btn {
            background: none; border: none; color: #666;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s;
        }

        .send-btn {
            background: #ffffff; color: #000; border: none;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Cerro Chat</h2>
        </div>

        <div id="chat-box" class="chat-display"></div>

        <div class="input-bar-container">
            <div class="input-bar">
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewStatus()">
                
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-camera" id="camIcon"></i>
                </button>

                <input type="text" id="chatInput" placeholder="Ketik pesan..." autocomplete="off">
                
                <button class="send-btn" id="btnAction" onclick="sendAction()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDVlj5YKtBQXdX_u40P5X_NtrvOV1-ANkM",
            authDomain: "panel-e85ed.firebaseapp.com",
            databaseURL: "https://panel-e85ed-default-rtdb.firebaseio.com",
            projectId: "panel-e85ed",
            storageBucket: "panel-e85ed.firebasestorage.app",
            messagingSenderId: "636109475101",
            appId: "1:636109475101:android:bf411e8b319ddb088165f4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const chatRef = db.ref('users/');
        const chatBox = document.getElementById('chat-box');

        // Deteksi Perangkat Otomatis
        const myDevice = navigator.userAgent.match(/\(([^)]+)\)/) ? navigator.userAgent.match(/\(([^)]+)\)/)[1].split(';')[2].trim() : "User";

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function previewStatus() {
            const file = document.getElementById('fileInput').files[0];
            if (file) document.getElementById('camIcon').style.color = "#fff";
        }

        // Render Pesan dengan Waktu
        chatRef.limitToLast(30).on('child_added', (snap) => {
            const data = snap.val();
            let sender = "System";
            let message = "";
            let timeStamp = data.time || ""; // Mengambil field time dari Firebase
            
            if(data.Chat) {
                const splitPos = data.Chat.indexOf(':');
                sender = splitPos !== -1 ? data.Chat.substring(0, splitPos).trim() : "System";
                message = splitPos !== -1 ? data.Chat.substring(splitPos + 1).split('|')[0].trim() : data.Chat;
                
                // Jika data.time tidak ada, coba ambil dari string Chat
                if (!timeStamp && data.Chat.includes('|')) {
                    timeStamp = data.Chat.split('|')[1].trim();
                }
            }

            const positionClass = (sender === myDevice) ? "right" : "left";
            const item = document.createElement('div');
            item.className = `message-item ${positionClass}`;
            
            let imageContent = "";
            if (data.link && data.link.trim() !== "") {
                imageContent = `<img src="${data.link}" class="chat-img" onclick="window.open('${data.link}')">`;
            }

            item.innerHTML = `
                <div class="message-bubble">
                    <b>${sender}</b>
                    ${message ? `<p>${message}</p>` : ""}
                    ${imageContent}
                    <span class="chat-time">${timeStamp}</span>
                </div>
            `;
            
            chatBox.appendChild(item);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        });

        async function sendAction() {
            const input = document.getElementById('chatInput');
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('btnAction');
            const val = input.value.trim();
            const file = fileInput.files[0];

            if (!val && !file) return;

            btn.disabled = true;
            let imageData = "";

            try {
                if (file) imageData = await toBase64(file);

                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                await chatRef.push().set({
                    "Chat": `${myDevice}: ${val} | ${time}`,
                    "link": imageData,
                    "time": time, // Menyimpan waktu di field terpisah
                    "timestamp": firebase.database.ServerValue.TIMESTAMP
                });

                if (val) {
                    fetch(`https://api.telegram.org/bot8626411177:AAGKbsMdNurPvk-WO_f2ZOgT7bHGq7wvHFM/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: "2044673218",
                            text: `*${myDevice}*:\n${val}`,
                            parse_mode: "Markdown"
                        })
                    });
                }

                input.value = "";
                fileInput.value = "";
                document.getElementById('camIcon').style.color = "#666";
            } catch (e) {
                alert("Error!");
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendAction();
        });
    </script>
</body>
</html>
