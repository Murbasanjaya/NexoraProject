<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXORA USER V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #212121; --card: #2a2a2a; --border: #333; --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container { width: 100%; max-width: 600px; background: #1a1a1a; display: flex; flex-direction: column; position: relative; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDownOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(30px); } }

        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; }
        .header h1 { font-size: 0.8rem; letter-spacing: 3px; margin: 0; font-weight: 900; color: #444; }

        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .bubble-wrap { display: flex; width: 100%; position: relative; animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .bubble-wrap.right { justify-content: flex-end; }
        .bubble-wrap.msg-out { animation: slideDownOut 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .bubble { padding: 12px 16px; max-width: 85%; border-radius: 18px; font-size: 0.85rem; position: relative; }
        .left .bubble { background: #2a2a2a; border: 1px solid #333; border-bottom-left-radius: 4px; }
        .right .bubble { background: #fff; color: #000; border-bottom-right-radius: 4px; }
        
        .sender-label { font-size: 0.65rem; font-weight: 900; margin-bottom: 4px; display: block; opacity: 0.5; }
        .right .sender-label { text-align: right; color: #000; opacity: 0.3; }

        .action-btn { position: absolute; top: -10px; padding: 4px 8px; border-radius: 6px; font-size: 0.6rem; font-weight: 900; cursor: pointer; display: none; z-index: 5; }
        .del-btn { right: 0; background: #ff4444; color: #fff; }
        .dl-btn { left: 0; background: #fff; color: #000; text-decoration: none; border: 1px solid #ddd; }

        .bubble-wrap.is-mine:hover .del-btn { display: block; }
        .bubble-wrap.has-img:hover .dl-btn { display: flex; }

        .media { max-width: 100%; border-radius: 10px; margin-bottom: 8px; display: block; }
        .footer-info { font-size: 0.6rem; display: flex; justify-content: flex-end; gap: 4px; margin-top: 5px; opacity: 0.5; }

        .input-bar { padding: 15px; background: #1a1a1a; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; background: #222; border: 1px solid #333; border-radius: 30px; padding: 0 15px; display: flex; align-items: center; }
        .input-box input { flex: 1; background: none; border: none; color: #fff; padding: 12px 0; font-size: 0.85rem; }
        .btn-send { background: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header"><h1>CERRO MESSENGER</h1><i class="fas fa-fingerprint" style="color:#333"></i></div>
        <div id="chat-box" class="chat-box"></div>
        <div class="input-bar">
            <div class="input-box"><input type="text" id="textInput" placeholder="Tulis pesan..." autocomplete="off"></div>
            <button class="btn-send" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDVlj5YKtBQXdX_u40P5X_NtrvOV1-ANkM", authDomain: "panel-e85ed.firebaseapp.com", databaseURL: "https://panel-e85ed-default-rtdb.firebaseio.com", projectId: "panel-e85ed", storageBucket: "panel-e85ed.firebasestorage.app", messagingSenderId: "636109475101", appId: "1:636109475101:android:bf411e8b319ddb088165f4" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('users/');

        const BOT_TOKEN = "8626411177:AAGKbsMdNurPvk-WO_f2ZOgT7bHGq7wvHFM";
        const CHAT_ID = "2044673218";

        // Logic Nama: USER + Random ID
        if(!localStorage.getItem('user_device_id')) localStorage.setItem('user_device_id', 'DEV-' + Math.random().toString(36).substr(2, 9));
        if(!localStorage.getItem('user_name')) {
            const rand = Math.floor(1000000000 + Math.random() * 9000000000);
            localStorage.setItem('user_name', "USER " + rand);
        }
        
        const myDeviceID = localStorage.getItem('user_device_id');
        const myName = localStorage.getItem('user_name');

        let allData = [];

        db.on('value', snap => {
            const data = snap.val();
            if(!data) { document.getElementById('chat-box').innerHTML = ""; return; }
            allData = Object.keys(data).map(k => ({id: k, ...data[k]}));
            renderChat();
        });

        function renderChat() {
            const box = document.getElementById('chat-box');
            const msgs = allData.filter(m => m.senderName === myName || m.target === myName);
            msgs.sort((a,b) => a.timestamp - b.timestamp);
            const existingIds = Array.from(box.children).map(c => c.getAttribute('data-id'));

            msgs.forEach(m => {
                if(!existingIds.includes(m.id)) {
                    const isMe = m.deviceID === myDeviceID;
                    const wrap = document.createElement('div');
                    wrap.className = `bubble-wrap ${isMe ? 'right' : 'left'} ${isMe ? 'is-mine' : ''} ${m.type === 'image' ? 'has-img' : ''}`;
                    wrap.setAttribute('data-id', m.id);

                    let media = m.type === 'image' ? `<img src="${m.file}" class="media">` : (m.type === 'video' ? `<video src="${m.file}" class="media" controls></video>` : "");
                    let dlBtn = m.type === 'image' ? `<a href="${m.file}" download="NEXORA_${m.id}.jpg" class="action-btn dl-btn"><i class="fas fa-download"></i> UNDUH</a>` : "";

                    wrap.innerHTML = `
                        <div class="bubble">
                            <span class="sender-label">${isMe ? myName : (m.senderId || m.senderName)}</span>
                            ${isMe ? `<div class="action-btn del-btn" onclick="deleteMsg('${m.id}')">HAPUS</div>` : ''}
                            ${dlBtn}${media}<p style="margin:0;">${m.message || ""}</p>
                            <div class="footer-info"><span>${m.time}</span></div>
                        </div>`;
                    box.appendChild(wrap);
                    box.scrollTop = box.scrollHeight;
                }
            });

            Array.from(box.children).forEach(child => {
                if(!msgs.find(m => m.id === child.getAttribute('data-id'))) {
                    child.classList.add('msg-out');
                    setTimeout(() => child.remove(), 400);
                }
            });
        }

        async function handleSend() {
            const input = document.getElementById('textInput');
            if(!input.value.trim()) return;
            const msgText = input.value;
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            await db.push().set({
                senderId: "USER_CLIENT", deviceID: myDeviceID, senderName: myName,
                message: msgText, time: time, timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: `📩 [${myName}]\nIsi: ${msgText}` })
            });
            input.value = "";
        }

        function deleteMsg(id) { if(confirm("Hapus pesan?")) db.child(id).remove(); }
    </script>
</body>
</html>
