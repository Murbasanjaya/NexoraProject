<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXORA USER CHAT</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">

    <style>
        /* --- CSS TERINTEGRASI (NEXORA CORE) --- */
        :root {
            --glow-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Ambient Background */
        body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            bottom: -150px;
            right: -150px;
            filter: blur(80px);
            z-index: -1;
        }

        .panel {
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
        }

        .header h2 {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-align: center;
            margin: 10px 0 20px 0;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--glow-white);
        }

        /* Area Chat */
        .chat-display {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
            mask-image: linear-gradient(transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(transparent, black 5%, black 95%, transparent);
        }

        .chat-display::-webkit-scrollbar { width: 3px; }
        .chat-display::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .message-item {
            margin-bottom: 12px;
            animation: fadeIn 0.4s ease;
        }

        .message-item p {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 15px;
            border-left: 3px solid var(--glow-white);
            font-size: 0.8rem;
            line-height: 1.4;
            margin: 0;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            word-wrap: break-word;
        }

        .chat-img {
            max-width: 70%;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-top: 8px;
            display: block;
        }

        /* Input Area */
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 15px;
            border-radius: 15px;
            outline: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .send-btn {
            background: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .send-btn:active { transform: scale(0.9); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="panel">
        <div class="header">
            <h2>COMMUNITY</h2>
        </div>

        <div id="chat-box" class="chat-display"></div>

        <div class="controls">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Write a message...">
            </div>
            <button class="send-btn" onclick="sendData()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // --- JS TERINTEGRASI ---
        const firebaseConfig = {
            apiKey: "AIzaSyDVlj5YKtBQXdX_u40P5X_NtrvOV1-ANkM",
            authDomain: "panel-e85ed.firebaseapp.com",
            databaseURL: "https://panel-e85ed-default-rtdb.firebaseio.com",
            projectId: "panel-e85ed",
            storageBucket: "panel-e85ed.firebasestorage.app",
            messagingSenderId: "636109475101",
            appId: "1:636109475101:android:bf411e8b319ddb088165f4"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        const chatRef = db.ref('users/');
        const chatDisplay = document.getElementById('chat-box');

        // Deteksi Model HP Otomatis
        let userDevice = "User";
        try {
            const ua = navigator.userAgent;
            if (ua.includes("Android")) {
                const match = ua.match(/Android\s+([^\;]+);\s+([^\)]+)/);
                userDevice = match ? match[2] : "Android User";
            }
        } catch (e) { userDevice = "Guest"; }

        // Load Chat Real-time
        chatRef.limitToLast(25).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const item = document.createElement('div');
            item.className = 'message-item';

            let htmlContent = "";
            if (data.Chat) {
                const splitPos = data.Chat.indexOf(':');
                const sender = splitPos !== -1 ? data.Chat.substring(0, splitPos) : "System";
                const message = splitPos !== -1 ? data.Chat.substring(splitPos + 1) : data.Chat;

                htmlContent += `<p><b style="color:#fff;">${sender}</b><br>${message}</p>`;
            }
            
            if (data.link) {
                htmlContent += `<img src="${data.link}" class="chat-img">`;
            }

            item.innerHTML = htmlContent;
            chatDisplay.appendChild(item);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        });

        // Fungsi Kirim
        function sendData() {
            const chatInput = document.getElementById('chatInput');
            const messageText = chatInput.value.trim();
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (messageText === "") return;

            chatRef.push().set({
                "Chat": `${userDevice}: ${messageText} | ${time}`,
                "link": "",
                "timestamp": firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                chatInput.value = "";
            });
        }

        // Support Tombol Enter di Keyboard HP
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendData();
        });
    </script>
</body>
</html>
